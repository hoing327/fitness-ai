<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>피트니스 AI 어시스턴트</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root { --black:#0a0a0a; --white:#f5f2ec; --accent:#c8f542; --gray:#1e1e1e; --gray2:#2a2a2a; --muted:#666; --border:#333; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--black); color:var(--white); font-family:'Noto Sans KR',sans-serif; height:100vh; display:flex; flex-direction:column; overflow:hidden; }
  .header { padding:16px 20px 14px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px; flex-shrink:0; background:var(--black); }
  .logo-mark { width:36px; height:36px; background:var(--accent); border-radius:8px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .logo-mark svg { width:20px; height:20px; }
  .header-text h1 { font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:1px; color:var(--white); line-height:1; }
  .header-text p { font-size:11px; color:var(--muted); margin-top:2px; font-weight:300; }
  .status-dot { width:7px; height:7px; background:var(--accent); border-radius:50%; margin-left:auto; animation:pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }
  .quick-actions { padding:12px 16px; border-bottom:1px solid var(--border); display:flex; gap:8px; overflow-x:auto; flex-shrink:0; scrollbar-width:none; }
  .quick-actions::-webkit-scrollbar { display:none; }
  .chip { display:inline-flex; align-items:center; gap:5px; background:var(--gray); border:1px solid var(--border); border-radius:99px; padding:5px 12px; font-size:11.5px; font-weight:500; white-space:nowrap; cursor:pointer; color:var(--white); transition:all 0.15s; flex-shrink:0; font-family:'Noto Sans KR',sans-serif; }
  .chip:hover { background:var(--gray2); border-color:var(--accent); color:var(--accent); }
  .chat-area { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:14px; scrollbar-width:thin; scrollbar-color:var(--border) transparent; }
  .chat-area::-webkit-scrollbar { width:4px; }
  .chat-area::-webkit-scrollbar-thumb { background:var(--border); border-radius:99px; }
  .msg { display:flex; gap:10px; animation:fadeSlide 0.25s ease-out; }
  @keyframes fadeSlide { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .msg.user { flex-direction:row-reverse; }
  .avatar { width:28px; height:28px; border-radius:8px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:500; margin-top:2px; }
  .avatar.ai { background:var(--accent); color:var(--black); font-family:'Bebas Neue',sans-serif; font-size:13px; }
  .avatar.user-av { background:var(--gray2); color:var(--muted); border:1px solid var(--border); font-size:10px; }
  .bubble { max-width:78%; padding:10px 13px; border-radius:12px; font-size:13.5px; line-height:1.65; font-family:'Noto Sans KR',sans-serif; }
  .msg.ai .bubble { background:var(--gray); border:1px solid var(--border); border-top-left-radius:3px; }
  .msg.user .bubble { background:var(--accent); color:var(--black); border-top-right-radius:3px; font-weight:500; }
  .bubble a { color:var(--accent); text-decoration:underline; text-decoration-style:dotted; word-break:break-all; }
  .msg.user .bubble a { color:var(--black); }
  .bubble strong { font-weight:500; }
  .bubble p { margin-bottom:6px; }
  .bubble p:last-child { margin-bottom:0; }
  .bubble ul { padding-left:16px; margin:4px 0; }
  .bubble li { margin-bottom:3px; }
  .typing { display:flex; align-items:center; gap:4px; padding:12px 13px; }
  .dot { width:6px; height:6px; background:var(--accent); border-radius:50%; animation:bounce 1.2s ease-in-out infinite; }
  .dot:nth-child(2){animation-delay:0.2s} .dot:nth-child(3){animation-delay:0.4s}
  @keyframes bounce { 0%,80%,100%{transform:translateY(0);opacity:0.4} 40%{transform:translateY(-5px);opacity:1} }
  .input-area { padding:12px 16px 14px; border-top:1px solid var(--border); background:var(--black); flex-shrink:0; }
  .input-row { display:flex; gap:8px; align-items:flex-end; }
  textarea { flex:1; background:var(--gray); border:1px solid var(--border); border-radius:10px; padding:9px 13px; color:var(--white); font-family:'Noto Sans KR',sans-serif; font-size:13.5px; resize:none; outline:none; min-height:40px; max-height:120px; line-height:1.5; transition:border-color 0.15s; }
  textarea::placeholder { color:var(--muted); }
  textarea:focus { border-color:var(--accent); }
  .send-btn { width:40px; height:40px; background:var(--accent); border:none; border-radius:10px; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all 0.15s; }
  .send-btn:hover { background:#d4ff4a; transform:scale(1.04); }
  .send-btn:active { transform:scale(0.97); }
  .send-btn:disabled { background:var(--gray2); cursor:not-allowed; transform:none; }
  .send-btn svg { width:16px; height:16px; color:var(--black); }
  .input-hint { font-size:10.5px; color:var(--muted); margin-top:7px; text-align:center; font-family:'Noto Sans KR',sans-serif; }
  .welcome { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; text-align:center; padding:20px; gap:10px; }
  .welcome-icon { width:56px; height:56px; background:var(--accent); border-radius:16px; display:flex; align-items:center; justify-content:center; margin-bottom:4px; }
  .welcome-icon svg { width:30px; height:30px; }
  .welcome h2 { font-family:'Bebas Neue',sans-serif; font-size:24px; letter-spacing:1.5px; line-height:1.2; }
  .welcome p { font-size:13px; color:var(--muted); max-width:270px; line-height:1.65; font-weight:300; font-family:'Noto Sans KR',sans-serif; }
  .capability-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; width:100%; max-width:320px; margin-top:6px; }
  .cap-card { background:var(--gray); border:1px solid var(--border); border-radius:10px; padding:10px 12px; text-align:left; cursor:pointer; transition:all 0.15s; }
  .cap-card:hover { border-color:var(--accent); background:var(--gray2); }
  .cap-icon { font-size:18px; margin-bottom:5px; }
  .cap-title { font-size:11.5px; font-weight:500; color:var(--white); line-height:1.3; font-family:'Noto Sans KR',sans-serif; }
  .cap-desc { font-size:10.5px; color:var(--muted); margin-top:2px; line-height:1.4; font-family:'Noto Sans KR',sans-serif; }
</style>
</head>
<body>
<div class="header">
  <div class="logo-mark">
    <svg viewBox="0 0 24 24" fill="none" stroke="#0a0a0a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/>
      <line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/>
    </svg>
  </div>
  <div class="header-text">
    <h1>FITNESS AI</h1>
    <p>Claude 기반 · 헬스 · 식단 · 건강 상담</p>
  </div>
  <div class="status-dot"></div>
</div>

<div class="quick-actions">
  <div class="chip" onclick="sendQuick('스쿼트 올바른 자세 알려줘')">🏋️ 스쿼트 자세</div>
  <div class="chip" onclick="sendQuick('초보자를 위한 7일 운동 플랜 만들어줘')">📅 주간 플랜</div>
  <div class="chip" onclick="sendQuick('운동 전후에 무엇을 먹어야 해?')">🥗 식사 타이밍</div>
  <div class="chip" onclick="sendQuick('하루 단백질 섭취량은 얼마나 돼야 해?')">💊 단백질 섭취</div>
  <div class="chip" onclick="sendQuick('근육 유지하면서 체지방 줄이는 방법은?')">🔥 다이어트</div>
  <div class="chip" onclick="sendQuick('벤치프레스 튜토리얼 영상 링크 알려줘')">▶️ 운동 영상</div>
</div>

<div class="chat-area" id="chatArea">
  <div class="welcome" id="welcome">
    <div class="welcome-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#0a0a0a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/>
      </svg>
    </div>
    <h2>나만의 퍼스널<br>피트니스 코치</h2>
    <p>운동, 식단, 건강에 관한 무엇이든 물어보세요. Claude AI가 즉시 전문가 수준의 답변을 드립니다.</p>
    <div class="capability-grid">
      <div class="cap-card" onclick="sendQuick('데드리프트 YouTube 튜토리얼 링크 알려줘')">
        <div class="cap-icon">🎥</div>
        <div class="cap-title">운동 영상</div>
        <div class="cap-desc">운동 튜토리얼 링크 제공</div>
      </div>
      <div class="cap-card" onclick="sendQuick('가슴 근육을 키우는 최고의 운동은?')">
        <div class="cap-icon">🏋️</div>
        <div class="cap-title">운동 Q&A</div>
        <div class="cap-desc">트레이닝 팁 & 프로그램</div>
      </div>
      <div class="cap-card" onclick="sendQuick('근육 증가를 위한 식단 플랜 짜줘')">
        <div class="cap-icon">🥗</div>
        <div class="cap-title">식단 코칭</div>
        <div class="cap-desc">맞춤 식단 & 영양 가이드</div>
      </div>
      <div class="cap-card" onclick="sendQuick('운동 후 빠른 회복 방법은?')">
        <div class="cap-icon">💤</div>
        <div class="cap-title">회복 & 건강</div>
        <div class="cap-desc">수면, 휴식 & 부상 예방</div>
      </div>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="input-row">
    <textarea id="input" placeholder="운동, 식단, 건강에 대해 무엇이든 물어보세요..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
  <div class="input-hint">피트니스 AI · Claude 기반 · Enter키로 전송</div>
</div>

<script>
const SYSTEM_PROMPT = `당신은 운동 과학, 근력 트레이닝, 영양학, 건강에 특화된 전문 피트니스 AI 어시스턴트입니다. 과학적 근거에 기반한 실용적인 조언을 한국어로 제공합니다.

세 가지 핵심 기능:
1. 운동 영상 찾기: 운동 동작에 대한 질문 시 형식: [▶ 영상 보기: {운동명}](https://www.youtube.com/results?search_query={운동명+튜토리얼+올바른자세}) — 2~3개 링크 제공.
2. 운동 Q&A: 세트/횟수, 프로그래밍, 점진적 과부하, 회복, 부상 예방 등 트레이닝 관련 질문에 답변.
3. 식단 코칭: 매크로 영양소, 식사 타이밍, 칼로리, 식단 플랜, 보충제 등 맞춤 식단 가이드.

답변 규칙:
- 항상 한국어로 답변
- 간결하되 핵심 내용 포함, 마크다운 형식 사용
- 운동 설명 시 YouTube 영상 링크 반드시 포함
- 초보자에게는 안전 수칙과 자세 교정 강조`;

let messages = [], isLoading = false;

function autoResize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,120)+'px'; }
function handleKey(e) { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();} }
function sendQuick(text) { document.getElementById('input').value=text; sendMessage(); }
function hideWelcome() { const w=document.getElementById('welcome'); if(w)w.remove(); }

function addMessage(role, content) {
  hideWelcome();
  const ca=document.getElementById('chatArea');
  const msg=document.createElement('div'); msg.className=`msg ${role==='user'?'user':'ai'}`;
  const av=document.createElement('div'); av.className=`avatar ${role==='user'?'user-av':'ai'}`; av.textContent=role==='user'?'나':'AI';
  const bub=document.createElement('div'); bub.className='bubble';
  if(role==='assistant'){bub.innerHTML=formatMarkdown(content);}else{bub.textContent=content;}
  msg.appendChild(av); msg.appendChild(bub); ca.appendChild(msg); ca.scrollTop=ca.scrollHeight;
}

function addTyping() {
  hideWelcome();
  const ca=document.getElementById('chatArea');
  const msg=document.createElement('div'); msg.className='msg ai'; msg.id='typing';
  const av=document.createElement('div'); av.className='avatar ai'; av.textContent='AI';
  const bub=document.createElement('div'); bub.className='bubble';
  bub.innerHTML='<div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  msg.appendChild(av); msg.appendChild(bub); ca.appendChild(msg); ca.scrollTop=ca.scrollHeight;
}

function removeTyping() { const t=document.getElementById('typing'); if(t)t.remove(); }

function formatMarkdown(text) {
  return text
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\[(.+?)\]\((https?:\/\/[^\)]+)\)/g,'<a href="$2" target="_blank">$1</a>')
    .replace(/^### (.+)$/gm,'<strong style="font-size:13px;display:block;margin:8px 0 4px;">$1</strong>')
    .replace(/^## (.+)$/gm,'<strong style="font-size:14px;display:block;margin:10px 0 4px;">$1</strong>')
    .replace(/^- (.+)$/gm,'<li>$1</li>')
    .replace(/(<li>.*<\/li>)/gs,'<ul>$1</ul>')
    .replace(/\n\n/g,'</p><p>').replace(/\n/g,'<br>')
    .replace(/^(.+)$/,'<p>$1</p>');
}

async function sendMessage() {
  if(isLoading)return;
  const input=document.getElementById('input');
  const text=input.value.trim(); if(!text)return;
  input.value=''; input.style.height='auto';
  isLoading=true; document.getElementById('sendBtn').disabled=true;
  addMessage('user',text); messages.push({role:'user',content:text});
  addTyping();
  try {
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:SYSTEM_PROMPT,messages:messages})
    });
    const data=await res.json(); removeTyping();
    const reply=data.content?.[0]?.text||'죄송합니다. 응답을 생성하지 못했습니다. 다시 시도해 주세요.';
    messages.push({role:'assistant',content:reply}); addMessage('assistant',reply);
  } catch(err) {
    removeTyping(); addMessage('assistant','⚠️ 연결 오류가 발생했습니다. 인터넷 연결을 확인하고 다시 시도해 주세요.');
  }
  isLoading=false; document.getElementById('sendBtn').disabled=false; input.focus();
}
</script>
</body>
</html>
